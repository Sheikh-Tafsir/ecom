spring:
  application.name: demo
  servlet.multipart:
    enabled: true
    max-file-size: 5MB
    max-request-size: 30MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER_CLASS}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
      dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: foobared

  rabbitmq:
    host: ${MQ_HOST}
    port: ${MQ_PORT}
    username: ${MQ_USERNAME}
    password: ${MQ_PASSWORD}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-retries: 3
  http:
    converters:
      preferred-json-mapper: jackson

cors.allowed.origins: ${CORS_ALLOWED_ORIGINS}

server.port: 8080

logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    org.springframework.web.multipart: DEBUG

  pattern.console: '%d{yyyy-MM-dd HH:mm:ss} - %level - %logger{36} - %msg%n'

#  structured:
#    format:
#      console: logstash

access:
  token:
    value: ${ACCESS_TOKEN_SECRET}
    validity: 1800000

refresh:
  token:
    name: ${REFRESH_TOKEN_NAME}
    value: ${REFRESH_TOKEN_SECRET}
    validity: 604800000

cloudinary:
  cloud:
    name: ${CLOUDINARY_CLOUD_NAME}
  api:
    key: ${CLOUDINARY_API_KEY}
    secret: ${CLOUDINARY_API_SECRET}
  folder: ${CLOUDINARY_FOLDER}

supabase:
  url: ${SUPABASE_URL}
  api-key: ${SUPABASE_API_KEY}
  bucket: ${SUPABASE_BUCKET}

# RabbitMQ configuration
mail:
  queue: mail.queue
  exchange: mail.exchange
  routing-key: mail.send

service:
  queue: service.queue
  exchange: service.exchange
  routing-key: service.events.#

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true


springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.url: /v3/api-docs
