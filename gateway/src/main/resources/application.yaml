spring:
  application:
    name: gateway
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: foobared

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: chat-service-ws
              uri: http://localhost:3001
              predicates:
                - Path=/socket.io/**

            - id: chat-service
              uri: http://localhost:3001
              predicates:
                - Path=/chats/**

            - id: main-service
              uri: http://localhost:8081
              predicates:
                - Path=/**
#              filters:
#                - name: RequestRateLimiter
#                  args:
#                    key-resolver: "#{@ipKeyResolver}"
#                    redis-rate-limiter.replenishRate: 2
#                    redis-rate-limiter.burstCapacity: 4

server.port: 8080

cors.allowed.origins: ${CORS_ALLOWED_ORIGINS}

access.token.value: ${ACCESS_TOKEN_SECRET}

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security.oauth2: DEBUG

springdoc:
  swagger-ui:
    enabled: true
    url: /v3/api-docs
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    enabled: true