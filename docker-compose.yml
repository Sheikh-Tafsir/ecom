services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecom
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ecom
      - DB_USERNAME=user
      - DB_PASSWORD=password
    depends_on:
      - postgres
      - redis

  server:
    build: ./server
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ecom
      - DB_USERNAME=user
      - DB_PASSWORD=password
    depends_on:
      - postgres
      - redis
      - rabbitmq

  chat-server:
    build: ./server_chat
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_URL=postgres://user:password@postgres:5432/ecom
    depends_on:
      - postgres
      - redis

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - gateway
